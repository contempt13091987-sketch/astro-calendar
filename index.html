<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Астро-календарь на июнь 2026</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #dff5ff 0%, #edf9ff 48%, #ffffff 100%);
      color: #183044;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 28px;
      padding: 30px 24px;
      box-shadow: 0 20px 55px rgba(60, 130, 170, 0.18);
      text-align: center;
    }
    .moon {
      font-size: 42px;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0 0 14px;
      font-size: 29px;
      line-height: 1.12;
      letter-spacing: -0.4px;
    }
    p {
      margin: 0 auto 22px;
      font-size: 16px;
      line-height: 1.55;
      color: #4a6172;
    }
    .button {
      display: block;
      width: 100%;
      padding: 18px 20px;
      border-radius: 18px;
      background: #38aeea;
      color: white;
      text-decoration: none;
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 12px 28px rgba(56, 174, 234, 0.32);
    }
    .note {
      margin-top: 18px;
      font-size: 13px;
      color: #6b7d89;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="moon">🌙</div>
    <h1>Астро-календарь эмоциональных качелей</h1>
    <p>Июнь 2026: Луна, астрособытия и нумерологическая энергия каждого дня.</p>
    <a class="button" href="webcal://raw.githubusercontent.com/contempt13091987/astro-calendar/main/astro-calendar.ics">Добавить календарь в iPhone</a>
    <div class="note">После нажатия iPhone должен предложить подписаться на календарь.</div>
  </main>
</body>
</html>
